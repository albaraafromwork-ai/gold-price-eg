<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار الذهب والعملات في مصر</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .header { text-align: center; padding: 20px; color: #fbbf24; font-size: 24px; font-weight: bold; border-bottom: 1px solid #1e293b; }
        /* تصميم مشابه لـ eDahab */
        .widget-wrapper { background: #1e293b; border-radius: 15px; padding: 10px; margin-top: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        iframe { width: 100%; border: none; border-radius: 10px; }
        .app-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .app-buttons img { width: 120px; cursor: pointer; }
        .footer-text { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">أسعار الذهب والعملات الآن</div>

    <div class="widget-wrapper">
        <iframe src="https://egrates.com/widgets/gold_egypt_dark" height="550"></iframe>
    </div>

    <div class="widget-wrapper">
        <div style="padding: 10px; text-align: center; color: #fbbf24; font-weight: bold;">أسعار العملات (البنك المركزي)</div>
        <iframe src="https://egrates.com/widgets/currency_egypt_dark" height="350"></iframe>
    </div>

    <div class="app-buttons">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="App Store">
    </div>

    <div class="footer-text">التحديث يتم تلقائياً من قلب سوق الصاغة المصري</div>
</div>

</body>
</html>
